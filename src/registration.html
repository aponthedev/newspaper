<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Title -->
  <title> Html Template</title>
  <!-- Favicon -->
  <link rel="shortcut icon" href="assets/images/logo/favicon.png">
  <!-- Bootstrap -->
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <!-- Fontasosome -->
  <link rel="stylesheet" href="assets/css/fontawesome.min.css">
  <!-- Slick -->
  <link rel="stylesheet" href="assets/css/slick.css">
  <!-- line awesome -->
  <link rel="stylesheet" href="assets/css/line-awesome.min.css">
  <!-- Select2 -->
  <link rel="stylesheet" href="assets/css/select2.min.css">
  <!-- Main css -->
  <link rel="stylesheet" href="assets/css/main.css">
</head>

<body>
  <!--==================== Preloader Start ====================-->
<div class="preloader">
    <div class="loader-p"></div>
</div>
<!--==================== Preloader End ====================-->
  <!--==================== Body Overlay Start ====================-->
  <div class="body-overlay"></div>
  <!--==================== Body Overlay End ====================-->

  <!--==================== Sidebar Overlay End ====================-->
  <div class="sidebar-overlay"></div>
  <!--==================== Sidebar Overlay End ====================-->

  <!--==================== Scroll To Top Start ====================-->
  <button class="scroll-top" type="button">
    <svg class="scroll-top-progress" width="100%" height="100%" viewBox="-1 -1 102 102">
      <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98">
      </path>
    </svg>
  </button>
  <!--==================== Scroll to Top End ====================-->

<main class="page-wrapper">
    <section class="account">
        <div class="account-thumb bg-img" data-background-image="assets/images/thumbs/account-thumb.png"></div>
        <div class="account-content bg-img" data-background-image="assets/images/thumbs/account-content-overlay.png">
            <div class="account-header">
                <a class="account-logo" href="index.html">
                    <img src="assets/images/logo/logo.png" alt="">
                </a>
                <div class="account-heading">
                    <h2 class="account-heading__title">Join Us Now!</h2>
                    <p class="account-heading__subtitle">Register to play, win, and claim rewards.</p>
                </div>
            </div>

            <div class="account-body">
                <div class="social-auth">
                    <a class="social-auth__btn" href="#">
                        <img src="assets/images/icons/google.png" alt="">
                        <span>Login with Google</span>
                    </a>
                    <a class="social-auth__btn" href="#">
                        <img src="assets/images/icons/facebook.png" alt="">
                        <span>Login with Facebook</span>
                    </a>
                    <a class="social-auth__btn" href="#">
                        <img src="assets/images/icons/linkedin.png" alt="">
                        <span>Login with Linkedin</span>
                    </a>
                </div>

                <div class="account-divider">
                    <span>Or Register with</span>
                </div>

                <form class="account-form" action="">
                    <div class="row gy-4">
                        <div class="col-sm-6">
                            <label class="form--label required" for="">First Name</label>
                            <input class="form-control form--control" type="text" placeholder="First Name">
                        </div>
                        <div class="col-sm-6">
                            <label class="form--label required" for="">Last Name</label>
                            <input class="form-control form--control" type="text" placeholder="Last Name">
                        </div>
                        <div class="col-sm-12">
                            <label class="form--label required" for="">Email Address</label>
                            <input class="form-control form--control" type="text" placeholder="Email Address">
                        </div>
                        <div class="col-sm-6">
                            <label class="form--label required" for="">Password</label>
                            <div class="input-group input--group input--group-password">
                                <input class="form-control form--control" type="password" placeholder="Password">
                                <span class="input-group-text input-group-btn">
                                    <i class="far fa-eye-slash"></i>
                                </span>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <label class="form--label required" for="">Confirm password</label>
                            <div class="input-group input--group input--group-password">
                                <input class="form-control form--control" type="password"
                                    placeholder="Confirm password">
                                <span class="input-group-text input-group-btn">
                                    <i class="far fa-eye-slash"></i>
                                </span>
                            </div>
                        </div>
                        <div class="col-sm-12">
                            <div class="form--check gradient">
                                <input type="checkbox" id="agree" name="agree" class="form-check-input" required="">
                                <label for="agree" class="form-check-label">
                                    I agree with
                                    <a href="#" class="fs-14 ms-1" target="_blank">Privacy Policy</a>
                                    ,
                                    <a href="#" class="fs-14 ms-1" target="_blank">Terms of Service</a>
                                </label>
                            </div>
                        </div>
                    </div>
                    <button class="w-100 btn btn--base mt-4" type="submit">
                        Register now
                    </button>
                </form>

                <p class="account-info">Already have an account? <a href="login.html">Login now</a></p>

            </div>
        </div>
    </section>
</main>

<!-- Jquery js -->
<script src="assets/js/jquery-3.7.1.min.js"></script>
<!-- Bootstrap Bundle Js -->
<script src="assets/js/boostrap.bundle.min.js"></script>
<!-- Slick js -->
<script src="assets/js/slick.min.js"></script>
<!-- Select js -->
<script src="assets/js/select2.min.js"></script>
<!-- main js -->
<script src="assets/js/main.js"></script>
</body>

</html>
